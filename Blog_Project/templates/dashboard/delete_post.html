{% extends 'base.html' %}

{% block content %}
<div class="text-center">
  <h3>Are you sure you want to delete?</h3>

  <form method="post">
    {% csrf_token %}
    <button class="btn btn-danger">Yes, Delete</button>
    <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
