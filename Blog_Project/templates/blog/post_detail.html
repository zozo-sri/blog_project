{% extends 'base.html' %}

{% block content %}
<div class="card">
  {% if post.image %}
  <img src="{{ post.image.url }}" class="card-img-top">
  {% endif %}

  <div class="card-body">
    <h2>{{ post.title }}</h2>
    <p class="text-muted">By {{ post.author }} | {{ post.created_date }}</p>
    <hr>
    <p>{{ post.content }}</p>
  </div>
</div>
{% endblock %}
