{% extends 'base.html' %}

{% block content %}
<h2>Your Posts</h2>

<a href="{% url 'create_post' %}" class="btn btn-success mb-3">Create New</a>

<table class="table table-bordered">
  <thead>
    <tr>
      <th>Title</th>
      <th>Date</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for post in posts %}
    <tr>
      <td>{{ post.title }}</td>
      <td>{{ post.created_date }}</td>
      <td>
        <a href="{% url 'edit_post' post.id %}" class="btn btn-warning btn-sm">Edit</a>
        <a href="{% url 'delete_post' post.id %}" class="btn btn-danger btn-sm">Delete</a>
      </td>
    </tr>
    {% empty %}
    <tr><td colspan="3">No posts yet.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
